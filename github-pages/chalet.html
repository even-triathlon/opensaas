<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Carte à gratter - Répartition des chambres</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;min-height:100vh;overscroll-behavior:none}
body{
  font-family:Arial,Helvetica,sans-serif;
  background:radial-gradient(circle at top,rgba(255,165,60,.35),transparent 35%),linear-gradient(135deg,#111827,#020617 60%,#1f2937);
  color:white;display:flex;align-items:center;justify-content:center;padding:24px;overflow-x:hidden
}
.page{width:min(1200px,100%);text-align:center}
.header{margin-bottom:18px}
.logo{width:105px;height:105px;object-fit:contain;border-radius:999px;background:transparent;box-shadow:0 10px 30px rgba(0,0,0,.35)}
h1{margin:12px 0 6px;font-size:clamp(28px,5vw,56px);text-transform:uppercase;letter-spacing:1px}
.subtitle{margin:0;font-size:clamp(15px,2vw,22px);color:#fde68a}
.scratch-card{
  position:relative;width:100%;aspect-ratio:16/9;border-radius:28px;overflow:hidden;
  box-shadow:0 28px 70px rgba(0,0,0,.55);border:5px solid rgba(255,255,255,.22);
  background:#111;user-select:none;-webkit-user-select:none;touch-action:none;-webkit-touch-callout:none
}
.secret-image{position:absolute;inset:0;z-index:1;width:100%;height:100%;object-fit:cover;user-select:none;-webkit-user-drag:none;pointer-events:none;display:none}
#scratchCanvas{position:absolute;inset:0;z-index:3;width:100%;height:100%;cursor:grab;touch-action:none;-ms-touch-action:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;display:block}
.actions{margin-top:18px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
button{border:0;border-radius:999px;padding:13px 22px;font-size:16px;font-weight:700;cursor:pointer;color:#111827;background:linear-gradient(135deg,#facc15,#fb7185);box-shadow:0 10px 26px rgba(0,0,0,.35);position:relative;z-index:10}
button.secondary{background:rgba(255,255,255,.14);color:white;border:1px solid rgba(255,255,255,.25)}
.footer{margin-top:14px;color:#d1d5db;font-size:14px}
.confetti{position:fixed;top:-10px;width:10px;height:16px;opacity:.95;animation:fall linear forwards;z-index:20;pointer-events:none}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.9}}
@media(max-width:700px){body{padding:12px}.scratch-card{border-radius:18px;border-width:3px}.logo{width:80px;height:80px}button{padding:10px 18px;font-size:14px}}
</style>
</head>

<script>
const canvas=document.getElementById("scratchCanvas");
const card=document.getElementById("scratchCard");
const ctx=canvas.getContext("2d",{willReadFrequently:true});
let isDrawing=false,revealed=false,lastPoint=null,isRevealing=false;
let currentDpr=1;

function resizeAndPaint(){
  const rect=card.getBoundingClientRect();
  currentDpr=1;
  canvas.width=rect.width;
  canvas.height=rect.height;
  ctx.setTransform(1,0,0,1,0,0);
  paintCover();
}

function paintCover(){
  const rect=card.getBoundingClientRect();
  ctx.setTransform(1,0,0,1,0,0);
  ctx.globalCompositeOperation="source-over";
  ctx.clearRect(0,0,rect.width,rect.height);

  const img = document.getElementById('secretImage');
  ctx.drawImage(img, 0, 0, rect.width, rect.height);

  if(revealed) return;

  const gradient=ctx.createLinearGradient(0,0,rect.width,rect.height);
  gradient.addColorStop(0,"#f97316");
  gradient.addColorStop(.28,"#ec4899");
  gradient.addColorStop(.58,"#7c3aed");
  gradient.addColorStop(1,"#2563eb");

  ctx.fillRect(0,0,rect.width,rect.height);

  ctx.globalAlpha=.23;
  for(let i=0;i<160;i++){
    ctx.beginPath();
    ctx.arc(Math.random()*rect.width,Math.random()*rect.height,Math.random()*2.7+.6,0,Math.PI*2);
    ctx.fillStyle=Math.random()>.5?"#ffffff":"#fde68a";
    ctx.fill();
  }
  ctx.globalAlpha=1;

  ctx.strokeStyle="rgba(255,255,255,.18)";
  ctx.lineWidth=12;
  for(let x=-rect.height;x<rect.width;x+=54){
    ctx.beginPath();
    ctx.moveTo(x,0);
    ctx.lineTo(x+rect.height,rect.height);
    ctx.stroke();
  }

  ctx.fillStyle="rgba(15,23,42,1)";
  roundRect(ctx,0,0,rect.width,rect.height,28);
  ctx.fill();

  ctx.textAlign="center";
  ctx.fillStyle="#fff7ed";
  ctx.font=`900 ${Math.max(24,rect.width*.055)}px Arial`;
  ctx.fillText("SURPRISE CHALET",rect.width/2,rect.height*.45);

  ctx.fillStyle="#fde68a";
  ctx.font=`700 ${Math.max(14,rect.width*.026)}px Arial`;
  ctx.fillText("Gratte pour découvrir ta chambre",rect.width/2,rect.height*.53);

  ctx.globalCompositeOperation="destination-out";
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function getPoint(e){
  const rect=canvas.getBoundingClientRect();
  let clientX,clientY;
  if(e.touches&&e.touches.length>0){clientX=e.touches[0].clientX;clientY=e.touches[0].clientY;}
  else if(e.changedTouches&&e.changedTouches.length>0){clientX=e.changedTouches[0].clientX;clientY=e.changedTouches[0].clientY;}
  else{clientX=e.clientX;clientY=e.clientY;}
  return {x:clientX-rect.left,y:clientY-rect.top};
}

function startScratch(e){
  if(revealed)return;
  e.preventDefault();
  isDrawing=true;
  lastPoint=getPoint(e);
  eraseAt(lastPoint.x,lastPoint.y);
}

function moveScratch(e){
  if(!isDrawing||revealed)return;
  e.preventDefault();
  const p=getPoint(e);
  lastPoint?eraseLine(lastPoint,p):eraseAt(p.x,p.y);
  lastPoint=p;
  checkProgress();
}

function endScratch(e){
  if(e)e.preventDefault();
  isDrawing=false;
  lastPoint=null;
}

function eraseAt(x,y){
  const rect=card.getBoundingClientRect();
  const radius=Math.max(30,rect.width*.052);
  ctx.globalCompositeOperation="destination-out";
  ctx.beginPath();
  ctx.arc(x,y,radius,0,Math.PI*2);
  ctx.fill();
}

function eraseLine(from,to){
  const rect=card.getBoundingClientRect();
  const radius=Math.max(30,rect.width*.052);
  ctx.globalCompositeOperation="destination-out";
  ctx.lineWidth=radius*2;
  ctx.lineCap="round";
  ctx.lineJoin="round";
  ctx.beginPath();
  ctx.moveTo(from.x,from.y);
  ctx.lineTo(to.x,to.y);
  ctx.stroke();
  eraseAt(to.x,to.y);
}

function checkProgress(){
  if(revealed)return;
  const pixels=ctx.getImageData(0,0,canvas.width,canvas.height).data;
  let transparent=0,total=0;
  for(let i=3;i<pixels.length;i+=80){
    total++;
    if(pixels[i]===0)transparent++;
  }
  if(transparent/total>=.80)revealAll();
}

function clearWholeScratchLayer(){
  // Correction importante : on remet la matrice à l'identité.
  // Sinon sur iPhone / écran Retina, clearRect peut ne nettoyer qu'une partie du canvas.
  ctx.save();
  ctx.setTransform(1,0,0,1,0,0);
  ctx.globalCompositeOperation="source-over";
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.restore();
}

function revealAll(){
  if(revealed)return;
  revealed=true;
  isDrawing=false;
  lastPoint=null;
  paintCover();
  launchConfetti();
}

function startReveal(){
  if(isRevealing || revealed) return;
  isRevealing = true;
  const interval = setInterval(() => {
    const rect = card.getBoundingClientRect();
    const x = Math.random() * rect.width;
    const y = Math.random() * rect.height;
    eraseAt(x, y);
    checkProgress();
    if(revealed){
      clearInterval(interval);
      isRevealing = false;
    }
  }, 50);
}

function resetScratch(){
  revealed=false;
  isDrawing=false;
  lastPoint=null;
  isRevealing=false;
  canvas.style.display="block";
  resizeAndPaint();
}

function launchConfetti(){
  const colors=["#facc15","#fb7185","#38bdf8","#a7f3d0","#c084fc","#ffffff"];
  for(let i=0;i<120;i++){
    const piece=document.createElement("div");
    piece.className="confetti";
    piece.style.left=Math.random()*100+"vw";
    piece.style.background=colors[Math.floor(Math.random()*colors.length)];
    piece.style.animationDuration=(Math.random()*2+2.5)+"s";
    piece.style.transform=`rotate(${Math.random()*360}deg)`;
    piece.style.borderRadius=Math.random()>.5?"50%":"2px";
    document.body.appendChild(piece);
    setTimeout(()=>piece.remove(),5200);
  }
}

window.addEventListener("mouseup",endScratch,{passive:false});
window.addEventListener("resize",resizeAndPaint);
window.addEventListener("load",()=>{resizeAndPaint();setTimeout(resizeAndPaint,150);setTimeout(resizeAndPaint,500);});
resizeAndPaint();
</script>
</body>
</html>
