<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="robots" content="noindex, nofollow" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Accès réservé — Chalet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:Arial,Helvetica,sans-serif}
body{
  display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:radial-gradient(circle at top,rgba(255,165,60,.35),transparent 35%),linear-gradient(135deg,#111827,#020617 60%,#1f2937);
  padding:24px;color:white
}
.card{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);
  border-radius:24px;padding:40px 36px;text-align:center;width:min(380px,100%);
  backdrop-filter:blur(12px);box-shadow:0 24px 60px rgba(0,0,0,.5)
}
.lock{font-size:52px;margin-bottom:16px}
h1{font-size:22px;margin-bottom:6px;font-weight:700}
p{color:#d1d5db;font-size:14px;margin-bottom:28px}
input{
  width:100%;padding:14px 18px;border-radius:999px;border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.1);color:white;font-size:18px;text-align:center;
  outline:none;letter-spacing:4px;margin-bottom:16px;transition:border-color .2s,background .2s
}
input::placeholder{letter-spacing:0;color:rgba(255,255,255,.35);font-size:15px}
input:focus{border-color:rgba(250,204,21,.7);background:rgba(255,255,255,.15)}
button{
  width:100%;padding:14px;border:0;border-radius:999px;
  background:linear-gradient(135deg,#facc15,#fb7185);
  color:#111827;font-size:16px;font-weight:700;cursor:pointer;
  box-shadow:0 10px 26px rgba(0,0,0,.35);transition:opacity .15s
}
button:active{opacity:.85}
.error{color:#fb7185;font-size:13px;margin-top:12px;min-height:18px}
</style>
</head>
<body>
<div class="card">
  <div class="lock">🏔️</div>
  <h1>Accès réservé</h1>
  <p>Entre le mot de passe pour découvrir la répartition des chambres</p>
  <form onsubmit="checkPassword(event)">
    <input type="password" id="pwd" placeholder="Mot de passe" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" />
    <button type="submit">Entrer</button>
    <div class="error" id="err"></div>
  </form>
</div>
<script>
function checkPassword(e){
  e.preventDefault();
  const v=document.getElementById("pwd").value.trim().toLowerCase();
  if(v==="stage"){
    sessionStorage.setItem("chalet_auth","1");
    window.location.replace("chalet.html");
  }else{
    const err=document.getElementById("err");
    err.textContent="Mot de passe incorrect";
    document.getElementById("pwd").value="";
    document.getElementById("pwd").focus();
    setTimeout(()=>err.textContent="",2500);
  }
}
document.addEventListener("DOMContentLoaded",()=>document.getElementById("pwd").focus());
</script>
</body>
</html>
